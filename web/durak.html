<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подкидной дурак</title>
    <link rel="stylesheet" href="/src/durak.css" />
  </head>
  <body>
    <div class="durak-app">
      <header class="topbar">
        <div class="topbar-main">
          <a class="back-link" href="./">Лобби</a>
          <div class="title-block">
            <span class="title-kicker">Карточная игра</span>
            <h1>«Дурак»</h1>
          </div>
        </div>
        <div class="setup">
          <label for="playerCount">Игроков</label>
          <select id="playerCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
          <button id="newGameBtn" type="button">Новая партия</button>
        </div>
      </header>

      <main class="table">
        <section id="opponents" class="opponents"></section>

        <section class="center">
          <div id="winnerBanner" class="winner-banner"></div>
          <div class="table-stage">
            <div id="centerCards" class="center-cards"></div>
            <div id="trumpInfo" class="trump-info"></div>
          </div>
        </section>

        <section id="humanPanel" class="player">
          <div class="player-head">
            <div class="player-identity">
              <div class="player-avatar">1</div>
              <div class="player-title-wrap">
                <div class="player-title">Игрок 1</div>
                <div id="humanMeta" class="human-meta"></div>
              </div>
            </div>
          </div>
          <div class="player-meta">
            <div id="statusLine" class="status-line"></div>
            <div id="selectedInfo" class="selected-info"></div>
          </div>
          <div id="hand" class="hand"></div>
          <div class="actions">
            <button id="attackBtn" type="button">Атаковать</button>
            <button id="defendBtn" type="button">Побить</button>
            <button id="takeBtn" type="button">Забрать</button>
            <button id="passBtn" type="button">Пас</button>
          </div>
          <div id="log" class="log"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/durak.ts"></script>
  </body>
</html>
